<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fire Detection Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --text:    #e8eaf0;
    --muted:   #6b7280;
    --danger:  #ef4444;
    --success: #22c55e;
    --info:    #3b82f6;
    --warning: #f59e0b;
    --radius:  10px;
  }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  .layout { display: grid; grid-template-rows: 56px 1fr; min-height: 100vh; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; gap: 12px;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; }
  .flame-icon { font-size: 22px; }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  }
  .pill-normal  { background: rgba(34,197,94,.15);  color: var(--success); }
  .pill-alert   { background: rgba(239,68,68,.2);   color: var(--danger); animation: pulse-pill 1s step-start infinite; }
  @keyframes pulse-pill { 50% { opacity: .4; } }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .main { display: grid; grid-template-columns: 1fr 360px; gap: 16px; padding: 16px; }

  .left { display: flex; flex-direction: column; gap: 14px; }
  .right { display: flex; flex-direction: column; gap: 14px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 7px; color: var(--text); }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .metric { background: #12141d; border-radius: 8px; padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
  .metric-val   { font-size: 24px; font-weight: 600; }
  .c-danger  { color: var(--danger); }
  .c-success { color: var(--success); }
  .c-info    { color: var(--info); }
  .c-warning { color: var(--warning); }
  .c-muted   { color: var(--muted); }

  .video-wrap { position: relative; background: #000; border-radius: 8px; overflow: hidden; line-height: 0; }
  .video-wrap img { width: 100%; display: block; max-height: 420px; object-fit: contain; }
  .live-badge {
    position: absolute; top: 10px; right: 10px;
    background: rgba(239,68,68,.85); color: #fff;
    padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  }

  .progress-section { margin-top: 10px; }
  .prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .prog-label { font-size: 11px; color: var(--muted); width: 80px; }
  .prog-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .prog-fill  { height: 100%; border-radius: 3px; transition: width .4s; }
  .prog-val   { font-size: 11px; color: var(--muted); width: 50px; text-align: right; }

  .log-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 12px;
  }
  .log-item.fire { border-color: rgba(239,68,68,.4); background: rgba(239,68,68,.07); }
  .log-icon { margin-top: 1px; font-size: 14px; }
  .log-body { flex: 1; }
  .log-title { font-weight: 500; }
  .log-meta  { color: var(--muted); margin-top: 2px; }
  .tg-chip {
    display: inline-flex; align-items: center; gap: 3px; margin-top: 4px;
    background: rgba(59,130,246,.15); color: var(--info);
    font-size: 10px; padding: 1px 7px; border-radius: 10px;
  }

  .chart-canvas-wrap { position: relative; height: 160px; }

  .tg-row { display: flex; align-items: center; gap: 12px; }
  .tg-icon-box {
    width: 40px; height: 40px; border-radius: 8px;
    background: rgba(59,130,246,.15); display: flex; align-items: center;
    justify-content: center; font-size: 20px; color: var(--info);
  }
  .tg-info .name { font-size: 13px; font-weight: 500; }
  .tg-info .sub  { font-size: 11px; color: var(--success); margin-top: 2px; }

  @media (max-width: 900px) {
    .main    { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="layout">
  <div class="topbar">
    <div class="topbar-brand">
      <span class="flame-icon">🔥</span>
      Fire Detection Dashboard
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="status-pill" class="pill pill-normal"><span class="dot"></span><span id="status-text">NORMAL</span></span>
      <span id="clock" style="font-size:12px;color:var(--muted)"></span>
    </div>
  </div>

  <div class="main">
    <div class="left">
      <!-- Metrics -->
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Tổng alert</div>
          <div class="metric-val c-danger" id="m-total">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Hôm nay</div>
          <div class="metric-val c-danger" id="m-today">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Frame xử lý</div>
          <div class="metric-val c-info" id="m-frames">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Telegram gửi</div>
          <div class="metric-val c-success" id="m-tg">0</div>
        </div>
      </div>

      <!-- Video -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">📹 Live feed</div>
          <div class="live-badge-inline" style="font-size:11px;color:var(--danger);display:flex;align-items:center;gap:4px">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--danger);display:inline-block;animation:pulse-pill 1s step-start infinite"></span>
            Live
          </div>
        </div>
        <div class="video-wrap">
          <img src="/video_feed" alt="Live video feed">
          <div class="live-badge">LIVE</div>
        </div>
        <div class="progress-section">
          <div class="prog-row">
            <div class="prog-label">Fire count</div>
            <div class="prog-track"><div class="prog-fill" id="prog-count" style="width:0%;background:var(--success)"></div></div>
            <div class="prog-val" id="prog-count-val">0/5</div>
          </div>
          <div class="prog-row">
            <div class="prog-label">Fire area</div>
            <div class="prog-track"><div class="prog-fill" id="prog-area" style="width:0%;background:var(--info)"></div></div>
            <div class="prog-val" id="prog-area-val">0 px</div>
          </div>
        </div>
      </div>

      <!-- Chart -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">📊 Số alert theo giờ (hôm nay)</div>
        </div>
        <div class="chart-canvas-wrap">
          <canvas id="hourChart"></canvas>
        </div>
      </div>
    </div>

    <div class="right">
      <!-- Telegram status -->
      <div class="card">
        <div class="tg-row">
          <div class="tg-icon-box">✈️</div>
          <div class="tg-info">
            <div class="name">Telegram bot</div>
            <div class="sub">✓ Kết nối · Gửi ảnh khi có alert</div>
          </div>
        </div>
      </div>

      <!-- Alert log -->
      <div class="card" style="flex:1">
        <div class="card-head">
          <div class="card-title">🗒 Alert log</div>
          <span id="log-count" style="font-size:11px;color:var(--muted)">0 entries</span>
        </div>
        <div class="log-list" id="log-list">
          <div style="text-align:center;color:var(--muted);padding:20px;font-size:12px">Chưa có sự kiện</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const MAX_AREA = 5000;

// Clock
setInterval(() => {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("vi-VN");
}, 1000);

// Chart
const ctx = document.getElementById("hourChart").getContext("2d");
const hourChart = new Chart(ctx, {
  type: "bar",
  data: {
    labels: Array.from({length: 24}, (_, i) => i + ":00"),
    datasets: [{
      data: Array(24).fill(0),
      backgroundColor: "rgba(239,68,68,0.6)",
      borderRadius: 4,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: "#6b7280", font: { size: 10 } }, grid: { color: "#2a2d3a" } },
      y: { ticks: { color: "#6b7280", font: { size: 10 }, stepSize: 1 }, grid: { color: "#2a2d3a" }, beginAtZero: true }
    }
  }
});

// State poll
async function pollState() {
  try {
    const r = await fetch("/api/state");
    const d = await r.json();

    // Status pill
    const pill = document.getElementById("status-pill");
    const txt  = document.getElementById("status-text");
    txt.textContent = d.status;
    pill.className  = "pill " + (d.status === "FIRE ALERT" ? "pill-alert" : "pill-normal");

    // Metrics
    document.getElementById("m-total").textContent  = d.total_alerts;
    document.getElementById("m-today").textContent  = d.today_alerts;
    document.getElementById("m-frames").textContent = d.frame_id.toLocaleString();
    document.getElementById("m-tg").textContent     = d.tg_sent;

    // Progress
    const ratio = Math.min(d.fire_count / 5, 1);
    const pColor = ratio >= 1 ? "var(--danger)" : ratio > .5 ? "var(--warning)" : "var(--success)";
    document.getElementById("prog-count").style.width      = (ratio * 100) + "%";
    document.getElementById("prog-count").style.background = pColor;
    document.getElementById("prog-count-val").textContent  = d.fire_count + "/5";

    const aRatio = Math.min(d.fire_area / MAX_AREA, 1);
    document.getElementById("prog-area").style.width     = (aRatio * 100) + "%";
    document.getElementById("prog-area-val").textContent = d.fire_area + " px";

    // Chart
    if (d.hourly) {
      hourChart.data.datasets[0].data =
        Array.from({length: 24}, (_, i) => d.hourly[String(i)] || 0);
      hourChart.update("none");
    }
  } catch(e) {}
}

// Log poll
async function pollLogs() {
  try {
    const r = await fetch("/api/logs");
    const logs = await r.json();
    const el = document.getElementById("log-list");
    document.getElementById("log-count").textContent = logs.length + " entries";

    if (!logs.length) return;
    el.innerHTML = logs.map(l => `
      <div class="log-item ${l.status === 'FIRE ALERT' ? 'fire' : ''}">
        <div class="log-icon">${l.status === 'FIRE ALERT' ? '🔥' : '✓'}</div>
        <div class="log-body">
          <div class="log-title">${l.status} — frame #${l.frame_id}</div>
          <div class="log-meta">
            ${l.yolo ? 'YOLO: ' + l.labels.join(', ') + ' · ' : ''}Area: ${l.area} · ${l.time}
          </div>
          ${l.status === 'FIRE ALERT' ? '<div class="tg-chip">✈ Đã gửi Telegram</div>' : ''}
        </div>
      </div>
    `).join("");
  } catch(e) {}
}

setInterval(pollState, 800);
setInterval(pollLogs,  2000);
pollState();
pollLogs();
</script>
</body>
</html>
